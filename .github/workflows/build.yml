name: Build OpenWRT Firmware

concurrency:
  group: ${{ github.repository }}-${{ github.event.inputs.target || github.event.client_payload.router_model }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Router Model'
        required: true
        default: 'X86_64'
        type: string
      version:
        description: 'Firmware Version (YYYYMMDD)'
        required: false
        default: '20260405'
        type: string
      release:
        description: 'Create Release'
        required: false
        default: 'false'
        type: boolean
      build_id:
        description: 'Build ID (internal)'
        required: false
        default: ''
        type: string
      callback_url:
        description: 'Webhook callback URL'
        required: false
        default: ''
        type: string
      language:
        description: 'LuCI Language (e.g., zh_Hans, en)'
        required: false
        default: 'en'
        type: string

  repository_dispatch:
    types: [build-firmware]
    branches: [main]

env:
  DEBIAN_FRONTEND: noninteractive
  OPENWRT_VERSION: "25.12.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LUCI_LANG: ${{ inputs.language }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set TARGET from event
        id: set_target
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET=${{ github.event.client_payload.router_model }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ github.event.client_payload.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ github.event.client_payload.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV
          else
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ inputs.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ inputs.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Find Config File
        run: |
          CONFIG_FILE="${{ github.workspace }}/configs/${TARGET}.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE="${{ github.workspace }}/configs/$(echo $TARGET | tr 'A-Z' 'a-z' | tr '_' '-').config"
          fi
          if [ -f "$CONFIG_FILE" ]; then
            echo "Config: $CONFIG_FILE ($(wc -l < "$CONFIG_FILE") lines)"
          else
            echo "ERROR: No config found for: $TARGET"
            ls "${{ github.workspace }}/configs/" | head -20
            exit 1
          fi

      - name: Prepare Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache flex bison g++ gcc libc-dev \
            python3 python3-pip python3-setuptools python3-wheel \
            libncurses-dev libssl-dev zlib1g-dev libelf-dev autoconf \
            automake libtool pkg-config unzip rsync wget git curl \
            subversion bc findutils tar bzip2 gzip help2man

      - name: Check Available Resources
        run: |
          echo "=== System Resources ==="
          nproc
          free -h
          df -h /tmp /home
          echo "=== Setting build limits ==="
          echo "Reducing parallel jobs to prevent OOM on 7GB RAM runner"
          echo "MAKE_JOBS=4" >> $GITHUB_ENV
          echo "PARALLEL_JOBS=4" >> $GITHUB_ENV

      - name: Clone OpenWRT
        run: |
          rm -rf /tmp/openwrt
          git clone --depth 1 --branch v${{ env.OPENWRT_VERSION }} \
            https://github.com/openwrt/openwrt.git /tmp/openwrt

      - name: Setup Custom Files
        run: |
          cd /tmp/openwrt
          mkdir -p files
          cp -r "${{ github.workspace }}/files/"* files/ 2>/dev/null || true
          echo "${VERSION:-20260405}" > files/etc/vipin_version
          echo "${TARGET:-Unknown}" > files/etc/vipin_model
          echo "${LUCI_LANG:-zh_Hans}" > files/etc/vipin_language
          chmod +x files/etc.init.d/* 2>/dev/null || true
          chmod +x files/usr/sbin/* 2>/dev/null || true
          chmod +x files/etc/uci-defaults/* 2>/dev/null || true
          echo "=== Custom files ==="
          find files -type f | head -30

      - name: Update Feeds
        run: |
          cd /tmp/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy Configuration
        run: |
          cd /tmp/openwrt
          CONFIG_FILE="${{ github.workspace }}/configs/${TARGET}.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE="${{ github.workspace }}/configs/$(echo $TARGET | tr 'A-Z' 'a-z' | tr '_' '-').config"
          fi
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "=== Config loaded ($(wc -l < .config) lines) ==="
            head -5 .config
          else
            echo "ERROR: Config not found: $CONFIG_FILE"
            exit 1
          fi

      - name: Ensure Config Validity
        run: |
          cd /tmp/openwrt
          make defconfig 2>&1 | tail -5

      - name: Download Sources
        run: |
          cd /tmp/openwrt
          make download -j$(nproc)

      - name: Build Firmware
        id: build
        shell: bash
        run: |
          cd /tmp/openwrt
          mkdir -p artifacts
          set -o pipefail
          echo "=== Pre-build resource check ==="
          free -m
          df -h /tmp
          echo "=== Starting build with -j${PARALLEL_JOBS:-4} (limited for OOM prevention) ==="
          make -j${PARALLEL_JOBS:-4} world V=sc 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== Post-build resource check ==="
          free -m
          df -h /tmp
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "ERROR: make world failed with exit code $BUILD_EXIT"
            echo "=== Last 50 errors/warnings ==="
            grep -i "error\|failed\|kconfig" build.log | tail -50 || true
            echo "=== Last 100 lines of build log ==="
            tail -100 build.log
            cp build.log artifacts/
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          fi

      - name: Collect Artifacts
        run: |
          cd /tmp/openwrt
          mkdir -p artifacts
          find ./bin -name "*-sysupgrade.bin" -type f 2>/dev/null | while read f; do cp "$f" artifacts/; done
          find ./bin -name "*-factory.bin" -type f 2>/dev/null | while read f; do cp "$f" artifacts/; done
          find ./bin -name "*-initramfs.bin" -type f 2>/dev/null | while read f; do cp "$f" artifacts/; done
          find ./bin -name "*.img" -type f 2>/dev/null | while read f; do cp "$f" artifacts/; done
          find ./bin -name "openwrt-*.tar.gz" -type f 2>/dev/null | while read f; do cp "$f" artifacts/; done
          echo "=== Artifacts found ==="
          ls -la artifacts/ || echo "No artifacts"

      - name: Check Build Result
        run: |
          echo "Checking if firmware was built..."
          ARTIFACTS=$(find /tmp/openwrt/bin -type f \( -name "*-sysupgrade.bin" -o -name "*-factory.bin" -o -name "*-initramfs.bin" -o -name "*.img" \) 2>/dev/null | wc -l)
          if [ "$ARTIFACTS" -eq 0 ]; then
            echo "WARNING: No firmware files found!"
            echo "=== Check build log for errors ==="
            grep -i "error\|failed\|kconfig" /tmp/openwrt/build.log | tail -20 || true
            echo "=== Config after defconfig ==="
            head -10 /tmp/openwrt/.config || true
            echo "=== Check bin directory ==="
            find /tmp/openwrt/bin -type f 2>/dev/null | head -10 || echo "bin/ not found"
          else
            echo "Found $ARTIFACTS firmware files!"
            echo "=== Firmware files ==="
            find /tmp/openwrt/bin -type f \( -name "*-sysupgrade.bin" -o -name "*-factory.bin" -o -name "*-initramfs.bin" -o -name "*.img" \) 2>/dev/null
          fi

      - name: Create Firmware Package
        run: |
          cd /tmp/openwrt
          mkdir -p firmware-only
          find ./bin -name "*-sysupgrade.bin" -type f 2>/dev/null | while read f; do cp "$f" firmware-only/; done
          find ./bin -name "*-factory.bin" -type f 2>/dev/null | while read f; do cp "$f" firmware-only/; done
          find ./bin -name "*-initramfs.bin" -type f 2>/dev/null | while read f; do cp "$f" firmware-only/; done
          find ./bin -name "*.img" -type f 2>/dev/null | while read f; do cp "$f" firmware-only/; done
          find ./bin -name "openwrt-*.tar.gz" -type f 2>/dev/null | while read f; do cp "$f" firmware-only/; done
          if [ ! "$(ls -A firmware-only/)" ]; then
            echo "No firmware files found"
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          fi
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.TARGET }}-firmware
          path: |
            /tmp/openwrt/firmware-only/
            /tmp/openwrt/firmware-*.zip
          retention-days: 7

      - name: Upload to Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/openwrt/firmware-only/*.bin
            /tmp/openwrt/firmware-only/*.img
            /tmp/openwrt/firmware-only/*-sysupgrade.bin
            /tmp/openwrt/firmware-only/openwrt-*.tar.gz
            /tmp/openwrt/firmware-*.zip
          draft: true
          name: OpenWRT ${{ env.OPENWRT_VERSION }} - ${{ env.TARGET }}
          body: |
            Auto-built firmware for ${{ env.TARGET }}
            Build Date: ${{ github.run_timestamp }}
            OpenWRT Version: ${{ env.OPENWRT_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Webhook Callback
        if: always() && env.CALLBACK_URL != '' && env.CALLBACK_URL != 'skip'
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="completed"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            STATUS="failed"
            DOWNLOAD_URL=""
          fi
          echo "Sending webhook callback: build_id=$BUILD_ID, status=$STATUS"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ env.CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"build_id\": \"${{ env.BUILD_ID }}\",
              \"status\": \"$STATUS\",
              \"router_model\": \"${{ env.TARGET }}\",
              \"version\": \"${{ env.VERSION }}\",
              \"github_run_id\": \"${{ github.run_id }}\",
              \"download_url\": \"$DOWNLOAD_URL\"
            }")
          echo "Webhook response code: $HTTP_CODE"