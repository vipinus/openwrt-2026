name: Build OpenWRT Firmware

concurrency:
  group: ${{ github.repository }}-${{ github.event.inputs.target || github.event.client_payload.router_model }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Router Model'
        required: true
        default: 'X86_64'
        type: string
      version:
        description: 'Firmware Version (YYYYMMDD)'
        required: false
        default: '20260405'
        type: string
      release:
        description: 'Create Release'
        required: false
        default: 'false'
        type: boolean
      build_id:
        description: 'Build ID (internal)'
        required: false
        default: ''
        type: string
      callback_url:
        description: 'Webhook callback URL'
        required: false
        default: ''
        type: string
      language:
        description: 'LuCI Language (e.g., zh_Hans, en)'
        required: false
        default: 'en'
        type: string

  repository_dispatch:
    types: [build-firmware]
    branches: [main]

env:
  DEBIAN_FRONTEND: noninteractive
  OPENWRT_VERSION: "25.12.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LUCI_LANG: ${{ inputs.language }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set TARGET from event
        id: set_target
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET=${{ github.event.client_payload.router_model }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ github.event.client_payload.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ github.event.client_payload.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV
            echo "LUCI_LANG=${{ github.event.client_payload.language }}" >> $GITHUB_ENV
          else
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ inputs.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ inputs.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Find and Parse Config File
        run: |
          CONFIG_FILE="${{ github.workspace }}/configs/${TARGET}.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE="${{ github.workspace }}/configs/$(echo $TARGET | tr 'A-Z' 'a-z' | tr '_' '-').config"
          fi
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: No config found for: $TARGET"
            ls "${{ github.workspace }}/configs/" | head -20
            exit 1
          fi
          echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
          echo "Config: $CONFIG_FILE ($(wc -l < "$CONFIG_FILE") lines)"

          # Parse target and subtarget from config
          TARGET_ARCH=$(grep '^CONFIG_TARGET_' "$CONFIG_FILE" | head -1 | sed 's/CONFIG_TARGET_//;s/=y//')
          SUBTARGET=$(grep '^CONFIG_TARGET_.*=y' "$CONFIG_FILE" | sed -n '2p' | sed 's/CONFIG_TARGET_//;s/=y//')
          # Extract just the subtarget part (e.g., ramips_mt7621 -> mt7621)
          SUBTARGET_SHORT=$(echo "$SUBTARGET" | sed "s/${TARGET_ARCH}_//")

          echo "TARGET_ARCH=$TARGET_ARCH" >> $GITHUB_ENV
          echo "SUBTARGET_SHORT=$SUBTARGET_SHORT" >> $GITHUB_ENV
          echo "Parsed: arch=$TARGET_ARCH subtarget=$SUBTARGET_SHORT"

          # Parse DEVICE profile name from config
          DEVICE_LINE=$(grep 'CONFIG_TARGET_.*DEVICE_' "$CONFIG_FILE" | head -1)
          if [ -n "$DEVICE_LINE" ]; then
            PROFILE=$(echo "$DEVICE_LINE" | sed 's/.*DEVICE_//;s/=y//')
          else
            # Fallback for configs using CONFIG_TARGET_PROFILE
            PROFILE=$(grep 'CONFIG_TARGET_PROFILE' "$CONFIG_FILE" | sed 's/.*="DEVICE_//;s/"//')
          fi
          echo "IB_PROFILE=$PROFILE" >> $GITHUB_ENV
          echo "Device profile: $PROFILE"

          # Parse packages from config (skip TARGET_, LUCI_LANG_, and comment lines)
          PACKAGES=""
          while IFS= read -r line; do
            pkg=$(echo "$line" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            # Skip packages known to not exist in Image Builder
            case "$pkg" in
              kmod-bridge|kmod-mt7628) continue ;;
            esac
            PACKAGES="$PACKAGES $pkg"
          done < <(grep '^CONFIG_PACKAGE_' "$CONFIG_FILE")
          echo "IB_PACKAGES=$PACKAGES" >> $GITHUB_ENV
          echo "Packages:$PACKAGES"

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget file gawk unzip rsync zstd

      - name: Download Image Builder
        run: |
          IB_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET_ARCH}/${SUBTARGET_SHORT}/openwrt-imagebuilder-${OPENWRT_VERSION}-${TARGET_ARCH}-${SUBTARGET_SHORT}.Linux-x86_64.tar.zst"
          echo "Downloading: $IB_URL"
          wget -q "$IB_URL" -O /tmp/imagebuilder.tar.zst
          cd /tmp
          tar --zstd -xf imagebuilder.tar.zst
          IB_DIR=$(ls -d openwrt-imagebuilder-* | head -1)
          echo "IB_DIR=/tmp/$IB_DIR" >> $GITHUB_ENV
          echo "Image Builder: $IB_DIR"

      - name: Setup Custom Files
        run: |
          cd "$IB_DIR"
          mkdir -p custom-files
          cp -r "${{ github.workspace }}/files/"* custom-files/

          # Pre-bake latest upstream lists into the image so a fresh flash
          # is useful offline and doesn't burn the first-boot DNS window
          # on downloading them. Non-fatal: if GitHub is rate-limiting or
          # the URL 404s, the cached copy already in files/ is kept.
          echo "=== Refreshing upstream lists ==="
          VIDEO_URL="https://raw.githubusercontent.com/vipinus/openwrt-2026-video-domains/main/direct.txt"
          FORCE_CN_URL="https://raw.githubusercontent.com/vipinus/openwrt-2026-video-domains/main/force-cn-cidrs.txt"
          DNS_URL="https://raw.githubusercontent.com/vipinus/openwrt-2026-video-domains/main/dns.txt"
          DNSC_URL_BASE="https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3"
          mkdir -p custom-files/etc/vipin custom-files/etc/dnscrypt-proxy

          # Video-direct domain list (direct.txt) → seeds /etc/vipin/video-domains.remote
          if curl -fsSL --max-time 20 -o /tmp/direct.txt "$VIDEO_URL"; then
              mv /tmp/direct.txt custom-files/etc/vipin/video-domains.remote
              echo "video-domains.remote: $(wc -l < custom-files/etc/vipin/video-domains.remote) lines"
          else
              echo "WARN: video-domains fetch failed — keeping baked copy"
          fi

          # CN-view DNS server list → /etc/vipin/dns.txt
          # Sanity: require >=1 IP#PORT line, matching vipin-dns-refresh's gate
          if curl -fsSL --max-time 20 -o /tmp/dns.txt "$DNS_URL"; then
              dns_count=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+#[0-9]+$' /tmp/dns.txt || true)
              if [ "${dns_count:-0}" -ge 1 ]; then
                  mv /tmp/dns.txt custom-files/etc/vipin/dns.txt
                  echo "dns.txt: $dns_count servers"
              else
                  echo "WARN: dns.txt sanity failed ($dns_count servers < 1) — keeping baked copy"
                  rm -f /tmp/dns.txt
              fi
          else
              echo "WARN: dns.txt fetch failed — keeping baked copy"
          fi

          # Force-CN CIDR list (Tencent overseas + Fastly anycast) → /etc/vipin/force-cn-cidrs.txt
          # Sanity: require >= 10 CIDR rows, matching vipin-force-cn-refresh's gate
          if curl -fsSL --max-time 20 -o /tmp/force-cn-cidrs.txt "$FORCE_CN_URL"; then
              cidr_count=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' /tmp/force-cn-cidrs.txt || true)
              if [ "${cidr_count:-0}" -ge 10 ]; then
                  mv /tmp/force-cn-cidrs.txt custom-files/etc/vipin/force-cn-cidrs.txt
                  echo "force-cn-cidrs.txt: $cidr_count CIDRs"
              else
                  echo "WARN: force-cn-cidrs sanity failed ($cidr_count CIDRs < 10) — keeping baked copy"
                  rm -f /tmp/force-cn-cidrs.txt
              fi
          else
              echo "WARN: force-cn-cidrs fetch failed — keeping baked copy"
          fi

          # DNSCrypt resolvers list + minisig (pair; fetch both or neither)
          if curl -fsSL --max-time 30 -o /tmp/public-resolvers.md "$DNSC_URL_BASE/public-resolvers.md" && \
             curl -fsSL --max-time 10 -o /tmp/public-resolvers.md.minisig "$DNSC_URL_BASE/public-resolvers.md.minisig"; then
              mv /tmp/public-resolvers.md custom-files/etc/dnscrypt-proxy/public-resolvers.md
              mv /tmp/public-resolvers.md.minisig custom-files/etc/dnscrypt-proxy/public-resolvers.md.minisig
              echo "public-resolvers.md: $(wc -c < custom-files/etc/dnscrypt-proxy/public-resolvers.md) bytes"
          else
              echo "WARN: dnscrypt-resolvers fetch failed — keeping baked copy"
              rm -f /tmp/public-resolvers.md /tmp/public-resolvers.md.minisig
          fi

          # Map language code
          FINAL_LANG="${LUCI_LANG:-en}"
          case "$FINAL_LANG" in
            zh-CN|zh_CN) FINAL_LANG="zh_Hans" ;;
            zh-TW|zh_TW) FINAL_LANG="zh_Hant" ;;
            pt-BR|pt_BR) FINAL_LANG="pt_BR" ;;
          esac
          echo "FINAL_LANG=${FINAL_LANG}" >> $GITHUB_ENV

          echo "${VERSION:-20260405}" > custom-files/etc/vipin_version
          echo "${TARGET:-Unknown}" > custom-files/etc/vipin_model
          echo "${FINAL_LANG}" > custom-files/etc/vipin_language
          chmod +x custom-files/etc/init.d/* 2>/dev/null || true
          chmod +x custom-files/usr/sbin/* 2>/dev/null || true
          chmod +x custom-files/etc/uci-defaults/* 2>/dev/null || true

          # Map FINAL_LANG to our i18n file names
          OUR_LANG="${LUCI_LANG:-en}"
          case "$OUR_LANG" in
            zh_Hans) OUR_LANG="zh-CN" ;;
            zh_Hant) OUR_LANG="zh-TW" ;;
          esac

          # Remove unused VPN i18n files (keep only en + selected language)
          VPN_I18N_DIR="custom-files/usr/lib/lua/luci/view/vpn/i18n"
          if [ -d "$VPN_I18N_DIR" ]; then
            for f in "$VPN_I18N_DIR"/*.lua; do
              fname=$(basename "$f" .lua)
              if [ "$fname" != "en" ] && [ "$fname" != "$OUR_LANG" ]; then
                rm -f "$f"
              fi
            done
            echo "=== Kept VPN i18n ==="
            ls "$VPN_I18N_DIR"/
          fi

          echo "=== Custom files ==="
          find custom-files -type f | head -30

      - name: Add Language Packages
        run: |
          LANG_CODE="${FINAL_LANG:-en}"
          LANG_PACKAGES=""

          # Map LuCI lang codes to Image Builder package names
          case "$LANG_CODE" in
            zh_Hans) LANG_CODE="zh-cn" ;;
            zh_Hant) LANG_CODE="zh-tw" ;;
            pt_BR)   LANG_CODE="pt-br" ;;
          esac

          if [ "$LANG_CODE" != "en" ]; then
            LANG_PACKAGES="luci-i18n-base-${LANG_CODE}"
            # Only add app language packs that exist in Image Builder
            for pkg in firewall opkg; do
              if ls "$IB_DIR"/packages/*/luci-i18n-${pkg}-${LANG_CODE}_* >/dev/null 2>&1; then
                LANG_PACKAGES="$LANG_PACKAGES luci-i18n-${pkg}-${LANG_CODE}"
              else
                echo "Skipping luci-i18n-${pkg}-${LANG_CODE} (not available)"
              fi
            done
            echo "Adding language packages: $LANG_PACKAGES"
          fi

          echo "LANG_PACKAGES=$LANG_PACKAGES" >> $GITHUB_ENV

      - name: Build Firmware
        id: build
        run: |
          cd "$IB_DIR"

          ALL_PACKAGES="${IB_PACKAGES} ${LANG_PACKAGES}"
          echo "=== Building image ==="
          echo "Profile: $IB_PROFILE"
          echo "Packages: $ALL_PACKAGES"

          make image \
            PROFILE="$IB_PROFILE" \
            PACKAGES="$ALL_PACKAGES" \
            FILES=custom-files/ \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "ERROR: Image Builder failed with exit code $BUILD_EXIT"
            tail -30 build.log
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          fi

      - name: Collect Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/firmware
          echo "=== All files in IB bin ==="
          find "$IB_DIR/bin" -type f 2>/dev/null | head -20
          find "$IB_DIR/bin" -type f \( -name "*-sysupgrade.bin" -o -name "*-factory.bin" -o -name "*-factory.img" -o -name "*-initramfs.bin" -o -name "*.img.gz" \) -exec cp {} ${{ github.workspace }}/firmware/ \;
          echo "=== Firmware files ==="
          ls -lh ${{ github.workspace }}/firmware/ || echo "No artifacts"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-${{ env.TARGET }}-firmware
          path: firmware/
          retention-days: 7

      - name: Upload to Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v3
        with:
          files: |
            firmware/*
          draft: true
          name: OpenWRT ${{ env.OPENWRT_VERSION }} - ${{ env.TARGET }}
          body: |
            Auto-built firmware for ${{ env.TARGET }}
            Build Date: ${{ github.run_timestamp }}
            OpenWRT Version: ${{ env.OPENWRT_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Webhook Callback
        if: always() && env.CALLBACK_URL != '' && env.CALLBACK_URL != 'skip'
        env:
          WEBHOOK_SECRET: ${{ secrets.FIRMWARE_WEBHOOK_SECRET }}
        run: |
          if [ "$BUILD_STATUS" = "success" ]; then
            STATUS="completed"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            ERROR_MSG=""
          else
            STATUS="failed"
            DOWNLOAD_URL=""
            ERROR_MSG="Build failed on GitHub Actions (run ${{ github.run_id }})"
          fi
          echo "Sending webhook callback: build_id=$BUILD_ID, status=$STATUS"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ env.CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{
              \"build_id\": \"${{ env.BUILD_ID }}\",
              \"status\": \"$STATUS\",
              \"router_model\": \"${{ env.TARGET }}\",
              \"version\": \"${{ env.VERSION }}\",
              \"github_run_id\": \"${{ github.run_id }}\",
              \"download_url\": \"$DOWNLOAD_URL\",
              \"error_message\": \"$ERROR_MSG\"
            }")
          echo "Webhook response code: $HTTP_CODE"
