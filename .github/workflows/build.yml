name: Build OpenWRT Firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target Router Model'
        required: true
        default: 'X86_64'
        type: string
      version:
        description: 'Firmware Version (YYYYMMDD)'
        required: false
        default: '20260405'
        type: string
      release:
        description: 'Create Release'
        required: false
        default: 'false'
        type: boolean
      build_id:
        description: 'Build ID (internal)'
        required: false
        default: ''
        type: string
      callback_url:
        description: 'Webhook callback URL'
        required: false
        default: ''
        type: string

  repository_dispatch:
    types: [build-firmware]
    branches: [main]

env:
  DEBIAN_FRONTEND: noninteractive
  OPENWRT_VERSION: "24.10.4"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set TARGET from event
        id: set_target
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET=${{ github.event.client_payload.router_model }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ github.event.client_payload.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ github.event.client_payload.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_ENV
          else
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
            echo "BUILD_ID=${{ inputs.build_id }}" >> $GITHUB_ENV
            echo "CALLBACK_URL=${{ inputs.callback_url }}" >> $GITHUB_ENV
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Find Config File
        id: find_config
        run: |
          CONFIG_FILE="${{ github.workspace }}/configs/${TARGET}.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Config not found: $CONFIG_FILE"
            # Try lowercase
            CONFIG_FILE="${{ github.workspace }}/configs/$(echo $TARGET | tr 'A-Z' 'a-z' | tr '_' '-').config"
          fi
          if [ -f "$CONFIG_FILE" ]; then
            echo "Found: $CONFIG_FILE"
          else
            echo "ERROR: No config file found for target: $TARGET"
            ls -la "${{ github.workspace }}/configs/" | head -20
            exit 1
          fi

      - name: Prepare Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache flex bison g++ gcc libc-dev \
            python3 python3-pip python3-setuptools python3-wheel \
            libncurses-dev libssl-dev zlib1g-dev libelf-dev autoconf \
            automake libtool pkg-config unzip rsync wget git curl \
            subversion bc findutils tar bzip2 gzip

      - name: Clone OpenWRT
        run: |
          rm -rf /tmp/openwrt
          git clone --depth 1 --branch v${{ env.OPENWRT_VERSION }} \
            https://github.com/openwrt/openwrt.git /tmp/openwrt

      - name: Setup Custom Files
        run: |
          cd /tmp/openwrt
          rm -rf files
          mkdir -p files/etc/init.d files/usr/sbin files/etc/config files/etc/crontabs
          mkdir -p files/usr/share/luci/locale files/usr/lib/lua/luci/controller
          mkdir -p files/usr/lib/lua/luci/model/cbi files/usr/lib/lua/luci/view
          mkdir -p files/usr/lib/lua/luci/view/dnscrypt files/usr/lib/lua/luci/view/vpn
          mkdir -p files/usr/sbin files/etc/uci-defaults files/usr/share/luci/i18n

          echo "${VERSION:-20260405}" > files/etc/vipin_version
          echo "${TARGET:-Unknown}" > files/etc/vipin_model

          if [ -d "${{ github.workspace }}/files" ]; then
            cp -r "${{ github.workspace }}/files/"* files/ 2>/dev/null || \
            cp -r "${{ github.workspace }}/files/" files/
          fi

          echo "=== Custom files ==="
          find files -type f | head -20

      - name: Update Feeds
        run: |
          cd /tmp/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy Configuration
        run: |
          cd /tmp/openwrt
          CONFIG_FILE="${{ github.workspace }}/configs/${TARGET}.config"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE="${{ github.workspace }}/configs/$(echo $TARGET | tr 'A-Z' 'a-z' | tr '_' '-').config"
          fi
          cp "$CONFIG_FILE" .config
          echo "=== Config file head ==="
          head -5 .config

      - name: Configure
        run: |
          cd /tmp/openwrt
          make defconfig

      - name: Download Sources
        run: |
          cd /tmp/openwrt
          make download -j$(nproc)

      - name: Build Firmware
        run: |
          cd /tmp/openwrt
          make -j$(nproc) world 2>&1 | tee build.log
          echo "=== Build log tail ==="
          tail -30 build.log

      - name: Collect Artifacts
        run: |
          cd /tmp/openwrt
          mkdir -p artifacts

          find . -name "*.bin" -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
          done

          find . -name "*.img" -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
          done

          find . -name "*.tar.gz" -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
          done

          find . -name "*-sysupgrade.bin" -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
          done

          find . -name "openwrt-*.bin" -type f 2>/dev/null | while read f; do
            cp "$f" artifacts/
          done

          cp build.log artifacts/ 2>/dev/null || true

          echo "=== Artifacts found ==="
          ls -la artifacts/

      - name: Check Build Result
        run: |
          echo "Checking if firmware was built..."
          if [ -z "$(ls -A /tmp/openwrt/artifacts/*.bin 2>/dev/null)" ] && \
             [ -z "$(ls -A /tmp/openwrt/artifacts/*.img 2>/dev/null)" ] && \
             [ -z "$(ls -A /tmp/openwrt/artifacts/*.tar.gz 2>/dev/null)" ]; then
            echo "ERROR: No firmware files found!"
            echo "=== Check for kernel panic ==="
            grep -i "kernel\|panic\|error\|failed" /tmp/openwrt/build.log | tail -20 || true
            echo "=== Check for .config issues ==="
            head -50 /tmp/openwrt/.config 2>/dev/null || true
            echo "=== Check for build output ==="
            ls -la /tmp/openwrt/bin/ 2>/dev/null || echo "bin/ not found"
            ls -la /tmp/openwrt/staging_dir/ 2>/dev/null || echo "staging_dir/ not found"
          else
            echo "Firmware files found!"
          fi

      - name: Create ZIP
        run: |
          cd /tmp/openwrt/artifacts
          FIRMWARE_FILES=$(ls *.bin *.img *.tar.gz 2>/dev/null || true)
          if [ -n "$FIRMWARE_FILES" ]; then
            zip -r "firmware-${TARGET:-unknown}.zip" $FIRMWARE_FILES
            cp "firmware-${TARGET:-unknown}.zip" /tmp/openwrt/
            echo "=== ZIP created ==="
            ls -la *.zip
          else
            echo "No firmware files to zip"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.TARGET }}-firmware
          path: |
            /tmp/openwrt/artifacts/
            /tmp/openwrt/firmware-*.zip
          retention-days: 7

      - name: Upload to Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/openwrt/artifacts/*.bin
            /tmp/openwrt/artifacts/*.img
            /tmp/openwrt/artifacts/*.tar.gz
            /tmp/openwrt/firmware-*.zip
          draft: true
          name: OpenWRT ${{ env.OPENWRT_VERSION }} - ${{ env.TARGET }}
          body: |
            Auto-built firmware for ${{ env.TARGET }}
            Build Date: ${{ github.run_timestamp }}
            OpenWRT Version: ${{ env.OPENWRT_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Webhook Callback
        if: env.CALLBACK_URL != ''
        run: |
          if [ -n "${{ env.BUILD_ID }}" ] && [ -n "${{ env.CALLBACK_URL }}" ]; then
            if [ "${{ job.status }}" = "success" ]; then
              STATUS="completed"
              DOWNLOAD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            else
              STATUS="failed"
              DOWNLOAD_URL=""
            fi
            
            curl -s -X POST "${{ env.CALLBACK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"build_id\": \"${{ env.BUILD_ID }}\",
                \"status\": \"$STATUS\",
                \"router_model\": \"${{ env.TARGET }}\",
                \"version\": \"${{ env.VERSION }}\",
                \"github_run_id\": \"${{ github.run_id }}\",
                \"download_url\": \"$DOWNLOAD_URL\"
              }"
          fi
