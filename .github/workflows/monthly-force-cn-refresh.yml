name: Monthly force-cn CIDR refresh

# Rebuild files/etc/vipin/force-cn-cidrs.txt from RADB whois on the last day
# of each month. Router pulls the fresh file on the 1st via cron (see
# files/etc/crontabs/root: vipin-force-cn-refresh).
#
# Trigger: cron runs 23:55 UTC on days 28-31; step 1 checks if *tomorrow* is
# the 1st, exits early otherwise. This matches the existing pattern in the
# sibling openwrt-2026-video-domains monthly audit.

on:
  schedule:
    - cron: '55 23 28-31 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm last-day-of-month
        id: gate
        run: |
          tomorrow=$(date -u -d "tomorrow" +%d)
          echo "tomorrow=$tomorrow"
          if [ "$tomorrow" != "01" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Not last day; skipping." && echo "skip=1" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != '1'
        with:
          fetch-depth: 1

      - name: Install deps
        if: steps.gate.outputs.skip != '1'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq whois python3

      - name: Fetch + aggregate RADB
        if: steps.gate.outputs.skip != '1'
        run: |
          for asn in AS132203 AS139341; do
              echo "-- fetching $asn --"
              whois -h whois.radb.net "!g$asn" > "/tmp/${asn}.raw" 2>&1
          done
          wc -l /tmp/AS*.raw

          python3 <<'PY' > /tmp/force-cn-cidrs.txt
          import re, ipaddress, datetime
          seen = set()
          for f in ("/tmp/AS132203.raw", "/tmp/AS139341.raw"):
              raw = open(f).read()
              # Strip RADB header "A<bytes>" / trailer "C"
              body = re.sub(r'^A\d+\s*', '', raw)
              body = re.sub(r'\s*C\s*$', '', body)
              # Remove wrap-induced newlines mid-token
              body = body.replace('\n', '')
              for t in re.split(r'\s+', body):
                  # Accept only /8-/32 (anything shorter is a line-wrap artifact)
                  if re.fullmatch(r'(\d{1,3}\.){3}\d{1,3}/(8|9|1[0-9]|2[0-9]|3[0-2])', t):
                      try:
                          seen.add(ipaddress.IPv4Network(t, strict=False))
                      except ValueError:
                          pass

          agg = list(ipaddress.collapse_addresses(seen))

          # Defensive: drop any prefix that would capture un.fanq.in
          # (47.242.64.28 — Alibaba HK, not Tencent; shouldn't normally collide
          # but guard in case BGP shifts).
          UN_IP = ipaddress.IPv4Address("47.242.64.28")
          filtered = [n for n in agg if UN_IP not in n]
          excluded = [str(n) for n in agg if UN_IP in n]

          today = datetime.date.today().isoformat()
          out = open('/tmp/force-cn-cidrs.txt', 'w')
          out.write("# Tencent overseas BGP prefixes — AS132203 (Tencent Cloud) + AS139341 (ACE)\n")
          out.write("# Auto-generated by .github/workflows/monthly-force-cn-refresh.yml\n")
          out.write(f"# Generated {today} UTC. {len(filtered)} prefixes after aggregation.\n")
          if excluded:
              out.write(f"# Excluded (contains un.fanq.in 47.242.64.28): {excluded}\n")
          out.write("#\n")
          for n in sorted(filtered, key=lambda x:(int(x.network_address), x.prefixlen)):
              out.write(f"{n}\n")

          out.write("\n# ===== Third-party CDN used by Tencent Video overseas =====\n")
          out.write("# Fastly anycast: Tencent Video OTT region endpoints fall back here\n")
          out.write("# when primary Tencent Cloud edges are unreachable or sharding dictates.\n")
          out.write("# Trade-off: other Fastly-hosted sites also route through CN tunnel.\n")
          out.write("151.101.0.0/16\n")
          out.close()
          print(f"wrote {len(filtered)} Tencent prefixes + 1 Fastly block")
          PY

          mv /tmp/force-cn-cidrs.txt files/etc/vipin/force-cn-cidrs.txt

      - name: Commit if changed
        if: steps.gate.outputs.skip != '1'
        id: commit
        run: |
          git config user.email "bot@anyfq.com"
          git config user.name "force-cn bot"
          git add files/etc/vipin/force-cn-cidrs.txt
          if git diff --cached --quiet; then
              echo "No changes, skipping commit."
              echo "changed=0" >> $GITHUB_OUTPUT
              exit 0
          fi
          CNT=$(grep -cE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]+' files/etc/vipin/force-cn-cidrs.txt)
          git commit -m "chore(force-cn): monthly refresh — ${CNT} prefixes"
          git push
          echo "changed=1" >> $GITHUB_OUTPUT
          echo "count=${CNT}" >> $GITHUB_OUTPUT

      - name: Discord notify
        if: always() && steps.gate.outputs.skip != '1'
        run: |
          STATUS="${{ job.status }}"
          CNT="${{ steps.commit.outputs.count }}"
          CHG="${{ steps.commit.outputs.changed }}"
          if [ "$STATUS" = "success" ] && [ "$CHG" = "1" ]; then
              MSG="✅ force-cn-cidrs refreshed: \`${CNT}\` prefixes (commit pushed)"
          elif [ "$STATUS" = "success" ] && [ "$CHG" = "0" ]; then
              MSG="ℹ️ force-cn-cidrs refresh: no change since last run"
          else
              MSG="🚨 force-cn-cidrs refresh FAILED (run: ${{ github.run_id }})"
          fi
          curl -s -X POST -H 'Content-Type: application/json' \
               -d "{\"content\": \"${MSG}\"}" \
               "${{ secrets.DISCORD_WEBHOOK }}" || true
