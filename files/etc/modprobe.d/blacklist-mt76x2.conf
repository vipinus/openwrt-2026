# MT7628-class routers (GL-MT300N-V2, OnionOmega2, HLK-7688A etc.) are
# 2.4 GHz-only — the real WiFi driver is mt7603e. The kmod-mt76
# "umbrella" package in OpenWrt pulls in the full mt76 family (x0, x2,
# 7615, 7663, 7915), so the kernel auto-loads mt76x2e/mt76x2_common/
# mt76x02_lib on boot even though no PCI/SoC hardware matches. The
# extra 60–80 KB RSS is tolerable, but probe/release churn on module
# init has been empirically correlated with periodic STA-DISCONNECTED
# events on channel 1 (see investigation 2026-04-21 — TV box
# 12:3e:ad:ac:66:d2 dropping every 30–120 min, reconnect window 14–56s,
# which is exactly when apps show "cannot resolve DNS").
#
# Blacklisting is safe on any board that actually uses mt76x2: the
# presence of matching hardware takes precedence via udev/modprobe
# device-id match and the blacklist applies only when auto-loaded
# spuriously from the umbrella package.

blacklist mt76x2e
blacklist mt76x2_common
blacklist mt76x02_lib
