# Blackhole residential-proxy & forced-P2P-CDN coordination endpoints.
#
# Why: these SDKs turn a customer's device into an exit node / peer for
# other users' traffic. When the coordination server is unreachable (our
# VPN split-tunnel breaks NAT-hole-punching, or ISP blocks), the SDK
# keeps probing ConnectivityManager → Android kernel re-evaluates the
# network → triggers DHCP RENEW. Observed: DHCPREQUEST every 3 seconds
# from the infected device, dragging dnsmasq CPU and log I/O on single-
# core MT7628 routers.
#
# Returning 0.0.0.0 lets the SDK fail fast without retry-storming.
#
# Verified live on 192.168.2.108 + Chromecast HD 192.168.2.183 (2026-04-20):
# blackholing these + pinning the TV's DHCP lease to 'infinite' stopped
# the storm. Tencent PCDN endpoints extracted from APK native lib
# `lib/armeabi/libDownloadProxy.so` (bundled in com.ktcp.video +
# com.newtv.cboxtv).

# --- Infatica P2B (residential proxy) ---
address=/infatica.io/0.0.0.0
address=/infatica.com/0.0.0.0
address=/p2b-sdk.io/0.0.0.0
address=/p2b.io/0.0.0.0
address=/peer2p.com/0.0.0.0

# --- Tencent PCDN / tpdlproxy coordination ---
# Safe: these are coordination/stats/NAT-traversal endpoints only.
# Primary video-CDN domains are distinct, so playback still works.
address=/apd-pcdnvodstat.teg.tencent-cloud.net/0.0.0.0
address=/apd-vodp2plogin.teg.tencent-cloud.net/0.0.0.0
address=/apd-vodp2pnat.teg.tencent-cloud.net/0.0.0.0
address=/apd-cable-monitor.teg.tencent-cloud.net/0.0.0.0
