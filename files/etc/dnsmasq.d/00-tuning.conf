# dnsmasq tuning flags not exposed via OpenWrt UCI. cache-size lives in
# UCI (dhcp.@dnsmasq[0].cachesize) — duplicating it here would trigger
# "illegal repeated keyword" and dnsmasq refuses to start.
#
# min-cache-ttl:    floor TTL at 5 min. Many CN CDNs give 10-60s TTL to
#                   defeat client caching; on overseas routers where
#                   every miss crosses the Pacific, that's the wrong
#                   trade-off.
# use-stale-cache:  serve expired records for up to 1h while dnsmasq
#                   refreshes in background. End-user never waits on
#                   a cache expiry.
min-cache-ttl=300
use-stale-cache=3600
