# Blackhole Infatica P2B residential-proxy SDK endpoints.
#
# Why: Infatica SDK (bundled in "earn money" / "rewards" apps on Android
# TV boxes) reaches out to the scheduler every 30–60s. When the reach
# fails (e.g. our VPN split-tunnel blocks the scheduler IP, or simply
# unreachable), the SDK calls ConnectivityManager.reportNetworkConnectivity()
# → Android kernel re-evaluates the network → triggers DHCP RENEW.
# Observed pattern: DHCPREQUEST every 3 seconds from the infected device,
# dragging dnsmasq CPU and log IO on single-core MT7628 routers.
#
# Verified live on 192.168.2.108 (2026-04-20): resolving these to 0.0.0.0
# + pinning the TV's DHCP lease to 'infinite' stopped the storm.

address=/infatica.io/0.0.0.0
address=/infatica.com/0.0.0.0
address=/p2b-sdk.io/0.0.0.0
address=/p2b.io/0.0.0.0
address=/peer2p.com/0.0.0.0
