# vipin TCP-over-TCP performance tuning
#
# Mitigates HoL blocking inherent in stunnel(TCP) + tun2socks(SOCKS5/TCP)
# nested transport. BBR + fq qdisc + larger socket buffers reduce the
# retransmit-amplification effect that makes nested-TCP feel slow on
# lossy links. Applied at boot via /etc/init.d/sysctl which iterates
# /etc/sysctl.d/*.conf.
#
# Requires kmod-tcp-bbr to be loaded; package added to per-target .config.
# Falls back silently if BBR isn't compiled in (e.g. minimal ramips builds
# missing kmod) — sysctl complains but doesn't error the boot.

net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_mtu_probing=1
net.ipv4.tcp_notsent_lowat=131072
net.core.rmem_max=16777216
net.core.wmem_max=16777216
