# Multi-stream / heavy-download tuning. Default OpenWrt conntrack limits
# (15360 entries) deadlock router when LAN clients run torrents, parallel
# downloads, or browser tabs hit 200+ concurrent connections.
#
# Field repro 2026-05-04: E5600 user reported "多路下载卡死" — apply boosted
# both conntrack capacity and TCP socket buffers.

net.netfilter.nf_conntrack_max = 65536
net.netfilter.nf_conntrack_buckets = 16384
net.netfilter.nf_conntrack_tcp_timeout_established = 7440

# Larger socket buffers help VPN throughput, especially with QUIC/hysteria
# where receive windows scale based on rmem.
net.core.rmem_max = 1048576
net.core.wmem_max = 1048576
net.ipv4.tcp_rmem = 4096 87380 1048576
net.ipv4.tcp_wmem = 4096 65536 1048576
net.core.netdev_max_backlog = 1000
